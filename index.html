<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Comments</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
      {
        "imports": {
          "marked": "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js",
          "dompurify": "https://cdn.jsdelivr.net/npm/dompurify/dist/purify.es.min.js"
        }
      }
    </script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Comments</h1>
            <p id="project-title"></p>
        </header>

        <main>
            <div id="comment-form-container">
                <form id="comment-form">
                    <img id="current-user-avatar" src="" alt="Your avatar" class="avatar">
                    <div class="form-content">
                        <textarea id="comment-input" placeholder="Add a comment..." required></textarea>
                        <div id="image-preview-container"></div>
                        <div class="form-actions">
                            <label for="image-upload" class="image-upload-button">
                                <img src="image_icon.png" alt="Upload Image">
                            </label>
                            <input type="file" id="image-upload" accept="image/*" multiple style="display: none;">
                            <button type="submit">Post</button>
                        </div>
                    </div>
                </form>
            </div>
            <div id="comments-container">
                <div id="loading">Loading comments...</div>
            </div>
        </main>
    </div>
    <script type="module" src="script.js"></script>

</body>
</html>
